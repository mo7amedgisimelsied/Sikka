spring.application.name=backend-service
# Sensitive values are included here for development only and should be replaced with environment variables in production.

spring.datasource.url=jdbc:postgresql://localhost:5432/TestDB?currentSchema=test_schema
spring.jpa.properties.hibernate.default_schema=test_schema
spring.datasource.username=postgres
spring.datasource.password=2437
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
